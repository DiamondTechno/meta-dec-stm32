# meta-dec-stm32 layer config
# Diamond Technologies machine layer for STM32MP25-based DEC kits.

BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-dec-stm32"
BBFILE_PATTERN_meta-dec-stm32 := "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-dec-stm32 := "8"

EULA_FILE_ST:stm32mpcommonmx = "${LAYERDIR}/conf/eula/${MACHINE}"
EULA_FILE_ST_MD5SUM:stm32mpcommonmx = "8b505090fb679839cefbcc784afe8ce9"

LAYERVERSION_meta-dec-stm32 = "1"
LAYERSERIES_COMPAT_meta-dec-stm32 = "scarthgap styhead walnascar"

# meta-dec-stm32 stands on the ST upstream BSP plus meta-openembedded helpers.
# It deliberately does NOT depend on meta-st-cargt or meta-cargt-stm32mp-addons.
LAYERDEPENDS_meta-dec-stm32 = "stm-st-stm32mp"
LAYERDEPENDS_meta-dec-stm32 += "openembedded-layer meta-python"

# OpenSTLinux compatibility version (matches what meta-st-stm32mp publishes)
ST_OSTL_COMPATIBILITY_VERSION_meta-dec-stm32 = "6.1"
